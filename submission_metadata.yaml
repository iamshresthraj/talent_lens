  experience_band: "5-9 Years"

methodology_summary: >
  We built a hybrid cascading ranking system that combines dense semantics, sparse lexical indices,
  strict structural disqualifiers, and behavioral multipliers. Honeypots are filtered out using
  chronological and salary sanity rules. Disqualifiers enforce production-shipping career histories
  while penalizing consulting tenures and title job-hopping. Scores are dynamically scaled by an
  availability index (based on login recency and platform response rates). Reasoning is written
  using deterministic templating via MD5 hash selection over fact-grounded slots, ensuring 0% hallucination.

