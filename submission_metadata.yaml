compute:
  platform: "MacBook (Apple Silicon, arm64)"
  os: "macOS 26.5 (arm64)"
  python_version: "3.9.6"
  cpu_cores: 10
  ram_gb: 16
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_notes: >
    One-time build (scripts/00-04): downloads all-MiniLM-L6-v2 (network), then builds embeddings,
    TF-IDF index, feature table and JD vector into ./artifacts. Embedding 100k candidates on CPU
    takes ~60s on this machine; total build well under the indexing budget. rank.py itself is
    offline, CPU-only, and reads only local artifacts + candidates.jsonl.

# Measured on this machine for the full 100k-candidate dataset.
performance_metrics:
  indexing_time_seconds: 75
  ranking_time_seconds: 4.6
  peak_memory_usage_mb: 2645
  cpu_cores_used: 10
  gpu_used: false
  network_calls_during_ranking: false

declarations:
  cpu_only_ranking: true
  no_network_during_ranking: true
  runtime_under_5_min: true
  memory_under_16gb: true
  honeypot_check_done: true        # verified: 0 honeypots in the submitted top 100
  reasoning_grounded_no_hallucination: true  # verified: 0 hallucinated skills across all 100 rows
  i_built_this_system: true
